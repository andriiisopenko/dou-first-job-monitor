name: Daily DOU First Job Check

on:
  schedule:
    - cron: "0 7,19 * * *"
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Create data directory
        run: mkdir -p data

      - name: Restore SQLite database cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: data/vacancies.db
          key: vacancies-db-${{ github.run_id }}
          restore-keys: |
            vacancies-db-

      - name: Install dependencies
        run: npm install

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOU_FIRST_JOB_URL: ${{ secrets.DOU_FIRST_JOB_URL }}
          DATABASE_PATH: ./data/vacancies.db
          LOG_LEVEL: info
          HTTP_TIMEOUT_MS: 20000
        run: npm run dev

      - name: Save SQLite database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/vacancies.db
          key: vacancies-db-${{ github.run_id }}
